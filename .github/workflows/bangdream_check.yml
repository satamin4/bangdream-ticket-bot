name: バンドリイベント自動確認Bot

on:
  schedule:
    # 1時間ごとに自動実行（国際標準時基準）
    - cron: '15 * * * *'
  workflow_dispatch: # 手動実行用のボタン

permissions:
  contents: write # データを保存するための権限

jobs:
  check-bangdream:
    runs-on: ubuntu-latest

    steps:
    - name: プログラムを読み込む
      uses: actions/checkout@v4

    - name: Pythonの準備
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 必要なツールを自動インストール
      run: |
        pip install requests playwright
        playwright install chromium

    - name: プログラムの実行！
      run: python bangdream_ticket.py

    - name: 最新のイベント情報を記録して次回に引き継ぐ
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add .
        git commit -m "バンドリイベント情報を更新" || echo "変更なし"
        git push
